<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Aa en Maas - Phosphate Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body { display: flex; margin: 0; height: 100vh; width: 100vw; font-family: Arial, sans-serif; overflow: hidden; }
        #map-container { width: 50%; height: 100%; border-right: 2px solid #ccc; z-index: 1; }
        #chart-container { width: 50%; height: 100%; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        #chart-wrapper { flex-grow: 1; min-height: 0; }
        canvas { max-height: 100%; width: 100%; }
        #loading { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); z-index: 1000; font-weight: bold; color: #005A9C; }
    </style>
</head>
<body>
    
    <div id="loading">Loading CSV Data...</div>
    
    <div id="map-container"></div>
    <div id="chart-container">
        <h3 id="chart-title" style="color: #005A9C;">Select a location on the map</h3>
        <div id="chart-wrapper">
            <canvas id="phosphateChart"></canvas>
        </div>
    </div>

    <script>
        const CONFIG = {
            CSV_FILENAME: "OW_data_final_with_coords.csv",
            COL_LOCATION: "mepan_mepid",
            COL_X: "X",
            COL_Y: "Y",
            COL_YEAR: "Year",
            COL_VALUE: "KRW_Value"
        };

        // RD to GPS Coordinate Converter
        function rdToWgs84(x, y) {
            var x0 = 155000; var y0 = 463000;
            var dX = (x - x0) * 1e-5; var dY = (y - y0) * 1e-5;
            var SomN = (3235.65389 * dY) + (-32.51758 * Math.pow(dX, 2)) + (-0.2475 * Math.pow(dY, 2)) + (-0.84978 * Math.pow(dX, 2) * dY) + (-0.0655 * Math.pow(dY, 3)) + (-0.01712 * Math.pow(dX, 2) * Math.pow(dY, 2)) + (-0.00527 * Math.pow(dX, 4)) + (0.00971 * Math.pow(dX, 4) * dY) + (-0.00114 * Math.pow(dX, 2) * Math.pow(dY, 3)) + (-0.00039 * Math.pow(dX, 4) * Math.pow(dY, 2));
            var SomE = (5260.52916 * dX) + (105.94684 * dX * dY) + (2.45656 * dX * Math.pow(dY, 2)) + (-0.81885 * Math.pow(dX, 3)) + (0.05594 * dX * Math.pow(dY, 3)) + (-0.05607 * Math.pow(dX, 3) * dY) + (0.01199 * dX * Math.pow(dY, 4)) + (-0.00256 * Math.pow(dX, 3) * Math.pow(dY, 2)) + (0.00211 * dX * Math.pow(dX, 4)) + (0.00026 * Math.pow(dX, 3) * Math.pow(dY, 3));
            return [52.15543 + (SomN / 3600), 5.387206 + (SomE / 3600)];
        }

        var map = L.map('map-container').setView([51.68, 5.78], 10); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ==========================================
        // NEW: Try to load an exact River boundary file (if you have one)
        // ==========================================
        fetch('river.geojson')
            .then(response => response.json())
            .then(geojsonData => {
                L.geoJSON(geojsonData, {
                    style: { color: '#222', weight: 4, opacity: 0.9 } // Thick dark line
                }).addTo(map);
            })
            .catch(e => console.log("No river.geojson found. Skipping exact river path."));

        var ctx = document.getElementById('phosphateChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, title: { display: true, text: 'Phosphate (mg/l)' } }, x: { title: { display: true, text: 'Year' } } } 
            }
        });

        Papa.parse(CONFIG.CSV_FILENAME, {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: function(results) {
                document.getElementById('loading').style.display = 'none';
                processData(results.data);
            },
            error: function(err) {
                document.getElementById('loading').innerText = "Error loading CSV on GitHub.";
            }
        });

        function processData(data) {
            var groupedData = {};

            data.forEach(row => {
                let loc = row[CONFIG.COL_LOCATION];
                let rdX = row[CONFIG.COL_X];
                let rdY = row[CONFIG.COL_Y];
                let year = row[CONFIG.COL_YEAR];
                let val = row[CONFIG.COL_VALUE];

                if (!loc || !rdX || !rdY || !year) return;

                if (!groupedData[loc]) {
                    groupedData[loc] = { coords: rdToWgs84(rdX, rdY), history: {} };
                }
                groupedData[loc].history[year] = (val !== undefined && val !== null) ? val : null;
            });

            let allCoords = [];
            Object.keys(groupedData).forEach(locName => {
                let locInfo = groupedData[locName];
                if (isNaN(locInfo.coords[0])) return;
                
                allCoords.push(locInfo.coords);
                
                var marker = L.marker(locInfo.coords).addTo(map);
                marker.bindTooltip("<b>" + locName + "</b>");
                marker.on('click', function() { updateChart(locName, locInfo.history); });
            });

            // ==========================================
            // NEW: Draw a conceptual "Connect the Dots" line
            // ==========================================
            if(allCoords.length > 1) {
                L.polyline(allCoords, {
                    color: '#005A9C', 
                    weight: 2, 
                    dashArray: '5, 10', // Makes it dashed
                    opacity: 0.6
                }).addTo(map);
            }

            if(allCoords.length > 0) { map.fitBounds(allCoords); }
        }

        function updateChart(stationName, historyData) {
            document.getElementById('chart-title').innerText = 'Phosphate Trend: ' + stationName;
            let years = Object.keys(historyData).sort((a,b) => a - b);
            let values = years.map(y => historyData[y]);

            myChart.data.labels = years;
            myChart.data.datasets = [{
                label: 'Fosfor totaal-P (mg/l)',
                data: values, borderColor: '#005A9C', backgroundColor: 'rgba(0, 90, 156, 0.1)',
                borderWidth: 2, fill: true, spanGaps: true, tension: 0.15, pointRadius: 4
            }];
            myChart.update();
        }
    </script>
</body>
</html>
